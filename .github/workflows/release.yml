name: Release & Docker Build

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mediacurator

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      docker_tags: ${{ steps.docker_meta.outputs.tags }}
      docker_labels: ${{ steps.docker_meta.outputs.labels }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          REF: ${{ github.ref }}
        run: |
          if [[ "$REF" == refs/tags/v* ]]; then
            # Manual tag push - use the tag version directly
            VERSION=${GITHUB_REF#refs/tags/v}
            if [[ "$VERSION" == *-dev* ]] || [[ "$VERSION" == dev.* ]]; then
              IS_PRERELEASE=true
            else
              IS_PRERELEASE=false
            fi
          else
            # Auto-version: find highest version across ALL tags (dev + stable)
            # Extract numeric version from all tags: v0.0.236, vdev.0.0.235, v0.1.0-dev, etc.
            HIGHEST_TAG=""
            HIGHEST_MAJOR=0
            HIGHEST_MINOR=0
            HIGHEST_PATCH=0
            
            for tag in $(git tag -l 'v*'); do
              # Strip tag prefix: v0.0.236 -> 0.0.236, vdev.0.0.235 -> 0.0.235
              ver="$tag"
              ver="${ver#v}"       # remove leading v
              ver="${ver#dev.}"    # remove dev. prefix (old format)
              ver="${ver%%-dev*}"  # remove -dev* suffix (new format)
              
              M=$(echo "$ver" | cut -d. -f1)
              m=$(echo "$ver" | cut -d. -f2)
              P=$(echo "$ver" | cut -d. -f3)
              
              # Skip if not numeric
              [[ "$M" =~ ^[0-9]+$ ]] || continue
              [[ "$m" =~ ^[0-9]+$ ]] || continue
              [[ "$P" =~ ^[0-9]+$ ]] || continue
              
              # Compare: is this tag's version higher than current highest?
              if (( M > HIGHEST_MAJOR )) || \
                 (( M == HIGHEST_MAJOR && m > HIGHEST_MINOR )) || \
                 (( M == HIGHEST_MAJOR && m == HIGHEST_MINOR && P > HIGHEST_PATCH )); then
                HIGHEST_MAJOR=$M
                HIGHEST_MINOR=$m
                HIGHEST_PATCH=$P
                HIGHEST_TAG="$tag"
              fi
            done
            
            echo "Highest existing version: ${HIGHEST_MAJOR}.${HIGHEST_MINOR}.${HIGHEST_PATCH} (tag: ${HIGHEST_TAG:-none})"
            
            # Analyze commits since last tag for conventional commit bump type
            BUMP="patch"
            if [ -n "$HIGHEST_TAG" ]; then
              COMMITS=$(git log "${HIGHEST_TAG}..HEAD" --pretty=format:"%s%n%b" 2>/dev/null || echo "")
            else
              COMMITS=$(git log --pretty=format:"%s%n%b" 2>/dev/null || echo "")
            fi
            
            # Check for breaking changes -> major bump
            if echo "$COMMITS" | grep -qiE '(^[a-z]+!:|BREAKING CHANGE)'; then
              BUMP="major"
            # Check for features -> minor bump
            elif echo "$COMMITS" | grep -qiE '^feat(\(|:)'; then
              BUMP="minor"
            fi
            
            echo "Bump type: $BUMP"
            
            # Calculate next version
            case "$BUMP" in
              major)
                NEXT_MAJOR=$((HIGHEST_MAJOR + 1))
                NEXT_MINOR=0
                NEXT_PATCH=0
                ;;
              minor)
                NEXT_MAJOR=$HIGHEST_MAJOR
                NEXT_MINOR=$((HIGHEST_MINOR + 1))
                NEXT_PATCH=0
                ;;
              patch)
                NEXT_MAJOR=$HIGHEST_MAJOR
                NEXT_MINOR=$HIGHEST_MINOR
                NEXT_PATCH=$((HIGHEST_PATCH + 1))
                ;;
            esac
            
            VERSION="${NEXT_MAJOR}.${NEXT_MINOR}.${NEXT_PATCH}"
            
            if [[ "$REF" == refs/heads/main ]]; then
              IS_PRERELEASE=false
            else
              # Develop branch: append -dev suffix
              VERSION="${VERSION}-dev"
              IS_PRERELEASE=true
            fi
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Prerelease: ${IS_PRERELEASE}"

      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For tagged releases
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'dev') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'dev') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'dev') }}
            # For main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            # For develop branch
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/develop' }}
            # SHA for all
            type=sha,prefix=sha-

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ needs.prepare.outputs.docker_tags }}
          labels: ${{ needs.prepare.outputs.docker_labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BRANCH=${{ github.ref_name }}

  create-release:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    # Create releases for tags, develop and main branch pushes
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Install git-cliff with integrity verification
          curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.11.0/git-cliff-2.11.0-x86_64-unknown-linux-gnu.tar.gz -o git-cliff.tar.gz
          echo "80d89595216c44d5bacde999b30fc17858fda93061e0ae0d0c1b33b8b8150989  git-cliff.tar.gz" | sha256sum -c -
          tar -xzf git-cliff.tar.gz
          chmod +x git-cliff-2.11.0/git-cliff
          
          # Get the previous tag for comparison
          CURRENT_VERSION="${{ needs.prepare.outputs.version }}"
          BRANCH="$REF_NAME"
          
          # Find the last tag for changelog comparison
          if [[ "$BRANCH" == "develop" ]]; then
            # Get last dev tag (old vdev.* or new v*-dev format), sorted by creation date
            LAST_TAG=$(git tag -l --sort=-creatordate | grep -E '(^vdev\.|.*-dev$)' | head -n1 || echo "")
            echo "Looking for dev tags"
          else
            # Get last stable tag (exclude all dev tags)
            LAST_TAG=$(git tag -l 'v*' --sort=-version:refname | grep -vE '(^vdev\.|.*-dev$)' | head -n1 || echo "")
            echo "Looking for stable tags"
          fi
          
          echo "Branch: $BRANCH"
          echo "Current version: $CURRENT_VERSION"
          echo "Last tag found: $LAST_TAG"
          
          if [ -n "$LAST_TAG" ]; then
            # Generate changelog from last tag to HEAD
            echo "Generating changelog from $LAST_TAG to HEAD..."
            if ! ./git-cliff-2.11.0/git-cliff --config cliff.toml "$LAST_TAG"..HEAD --strip header > CHANGELOG_CONTENT.md; then
              echo "::warning::git-cliff failed to generate changelog from $LAST_TAG, falling back to commit messages"
            fi
          else
            # No tags exist, generate full changelog
            echo "No previous tags found, generating full changelog..."
            if ! ./git-cliff-2.11.0/git-cliff --config cliff.toml --strip header > CHANGELOG_CONTENT.md; then
              echo "::warning::git-cliff failed to generate full changelog, falling back to commit messages"
            fi
          fi
          
          # Check if changelog has content
          if [ -s CHANGELOG_CONTENT.md ]; then
            echo "Changelog generated successfully:"
            cat CHANGELOG_CONTENT.md
            # Remove the version header line that git-cliff adds (## [version] - date)
            CONTENT=$(cat CHANGELOG_CONTENT.md | sed '/^## \[/d' | sed '/^$/N;/^\n$/d')
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$CONTENT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "No changelog content generated, using commit messages..."
            # Fallback: use git log for changes since last tag
            if [ -n "$LAST_TAG" ]; then
              COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s" --no-merges 2>/dev/null || echo "")
            else
              COMMITS=$(git log --pretty=format:"- %s" --no-merges -20 2>/dev/null || echo "")
            fi
            
            if [ -n "$COMMITS" ]; then
              echo "content<<EOF" >> $GITHUB_OUTPUT
              echo "### Changes" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
              echo "$COMMITS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "content=No changes recorded for this release." >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create release notes
        id: notes
        env:
          CHANGELOG_CONTENT: ${{ steps.changelog.outputs.content }}
          VERSION: ${{ needs.prepare.outputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
        run: |
          # Create release notes with changelog and Docker instructions
          cat > release_notes.md << EOF
          ## What's Changed in ${VERSION}
          
          EOF
          
          # Add changelog content - remove version header line if present (git-cliff adds it)
          if [ -n "$CHANGELOG_CONTENT" ]; then
            # Remove the "## [x.x.x] - date" header line since we already have our own
            echo "$CHANGELOG_CONTENT" | sed '/^## \[/d' >> release_notes.md
          else
            echo "No changelog entries for this release." >> release_notes.md
          fi
          
          # Add Docker information
          cat >> release_notes.md << EOF
          
          ---
          
          ## Docker Images
          
          This release is available as a Docker image for amd64 architecture:
          
          ### Pull the image:
          \`\`\`bash
          # Specific version
          docker pull ghcr.io/${REPO_OWNER}/mediacurator:${VERSION}
          
          # Or latest stable (main branch)
          docker pull ghcr.io/${REPO_OWNER}/mediacurator:latest
          
          # Or development (develop branch)
          docker pull ghcr.io/${REPO_OWNER}/mediacurator:dev
          \`\`\`
          
          ### Run with Docker Compose:
          \`\`\`bash
          # Download docker-compose.yml
          curl -O https://raw.githubusercontent.com/${REPO}/main/docker-compose.yml
          
          # Start services
          docker compose up -d
          \`\`\`
          
          ## Registry Information
          
          | Property | Value |
          |----------|-------|
          | Registry | GitHub Container Registry (ghcr.io) |
          | Image | \`ghcr.io/${REPO_OWNER}/mediacurator\` |
          | Version | \`${VERSION}\` |
          | Architecture | linux/amd64 |
          
          > **Note:** ARM64 builds are not currently provided. Open a feature request if you need ARM support.
          
          ## Documentation
          
          See the [README.md](https://github.com/${REPO}/blob/main/README.md) for full configuration options.
          EOF
          
          echo "Release notes created with changelog"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # For tags: use the tag name directly
          # For develop: create vdev.X.X.X tag
          # For main: create vX.X.X tag
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', needs.prepare.outputs.version) }}
          # CRITICAL: Create tag on the current commit, not the default branch
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.is_prerelease == 'true' && format('Development Build {0}', needs.prepare.outputs.version) || format('Release {0}', needs.prepare.outputs.version) }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          make_latest: ${{ github.ref == 'refs/heads/main' }}
          token: ${{ secrets.GITHUB_TOKEN }}
