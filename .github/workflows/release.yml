name: Release & Docker Build

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mediacurator

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      docker_tags: ${{ steps.docker_meta.outputs.tags }}
      docker_labels: ${{ steps.docker_meta.outputs.labels }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Get commit count for consistent versioning across branches
          COMMIT_COUNT=$(git rev-list --count HEAD)
          
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tagged release (e.g., v1.2.3 -> 1.2.3)
            VERSION=${GITHUB_REF#refs/tags/v}
            IS_PRERELEASE=false
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            # Main branch - stable release with same count as dev
            VERSION="0.0.${COMMIT_COUNT}"
            IS_PRERELEASE=false
          else
            # Develop branch - prerelease with dev prefix
            VERSION="dev.0.0.${COMMIT_COUNT}"
            IS_PRERELEASE=true
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Prerelease: ${IS_PRERELEASE}"

      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For tagged releases
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # For main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            # For develop branch
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/develop' }}
            # SHA for all
            type=sha,prefix=sha-

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.prepare.outputs.docker_tags }}
          labels: ${{ needs.prepare.outputs.docker_labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BRANCH=${{ github.ref_name }}

  create-release:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Create releases for tags and develop branch pushes
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create release notes
        id: notes
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          IS_PRERELEASE="${{ needs.prepare.outputs.is_prerelease }}"
          
          # Create release notes with Docker instructions
          cat > release_notes.md << 'EOF'
          ${{ steps.changelog.outputs.content }}

          ## Docker Images

          This release is available as multi-architecture Docker images (amd64, arm64):

          ### Pull the image:
          ```bash
          # Specific version
          docker pull ghcr.io/${{ github.repository_owner }}/mediacurator:${VERSION}
          
          # Or latest stable (main branch)
          docker pull ghcr.io/${{ github.repository_owner }}/mediacurator:latest
          
          # Or development (develop branch)
          docker pull ghcr.io/${{ github.repository_owner }}/mediacurator:dev
          ```

          ### Run with Docker:
          ```bash
          docker run -d \
            --name mediacurator \
            -p 8080:8080 \
            -v $(pwd)/data:/app/data \
            -e SECRET_KEY=your-secret-key \
            ghcr.io/${{ github.repository_owner }}/mediacurator:${VERSION}
          ```

          ### Run with Docker Compose:
          ```bash
          # Download docker-compose.yml
          curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
          
          # Start services
          docker compose up -d
          ```

          ## Registry Information

          - **Registry**: GitHub Container Registry (ghcr.io)
          - **Image**: `ghcr.io/${{ github.repository_owner }}/mediacurator`
          - **Version**: `${VERSION}`
          - **Architectures**: linux/amd64, linux/arm64
          - **Base Image**: Python 3.14-slim (backend), Node 24-alpine (frontend build)

          ## Configuration

          See the [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for full configuration options.

          ### Required Environment Variables:
          - `SECRET_KEY` - Your secret key for JWT tokens (generate with `openssl rand -hex 32`)
          - `DATABASE_URL` - PostgreSQL connection string

          ### Optional Configuration:
          - Media server URLs (Emby, Jellyfin)
          - Sonarr/Radarr API endpoints
          - Notification webhooks (Discord, Slack, etc.)
          EOF
          
          echo "Release notes created"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name != 'develop' && github.ref_name || format('v{0}', needs.prepare.outputs.version) }}
          name: ${{ github.ref_name != 'develop' && format('Release {0}', needs.prepare.outputs.version) || format('Development Build {0}', needs.prepare.outputs.version) }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          make_latest: ${{ github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
