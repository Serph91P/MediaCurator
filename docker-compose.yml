# Production Docker Compose Configuration
# For development, see docker-compose.dev.yml

services:
  mediacleanup:
    # Use pre-built image from GitHub Container Registry
    image: ghcr.io/serph91p/cleanup-app:latest
    # Or use a specific version tag:
    # image: ghcr.io/serph91p/cleanup-app:v1.0.0
    # Or use develop branch:
    # image: ghcr.io/serph91p/cleanup-app:develop
    
    container_name: mediacleanup
    restart: unless-stopped
    
    # Run as non-root user (appuser with UID 1000)
    # If you get permission errors, run: sudo chown -R 1000:1000 ./data ./logs
    user: "1000:1000"
    
    ports:
      - "8080:8080"
    
    environment:
      # Timezone
      - TZ=${TZ:-Europe/Berlin}
      
      # Security - IMPORTANT: Change this in production!
      - SECRET_KEY=${SECRET_KEY:-please-change-this-secret-key-in-production}
      
      # Database
      - DATABASE_URL=sqlite+aiosqlite:///./data/mediacleanup.db
      
      # First user becomes admin
      - FIRST_USER_IS_ADMIN=true
      
      # Optional: Pre-create admin user (useful for automated deployments)
      # - INITIAL_ADMIN_USER=${ADMIN_USER:-}
      # - INITIAL_ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      
      # Optional: Debug mode (not recommended for production)
      # - DEBUG=false
    
    volumes:
      # Application data (database, config)
      - ./data:/data
      
      # Application logs
      - ./logs:/app/logs
      
      # Media mount - REQUIRED: Point to your actual media location
      # Mount as read-only (:ro) for safety
      - ${MEDIA_PATH:-/media}:/media:ro
      
      # Optional: Additional media paths
      # - /mnt/movies:/media/movies:ro
      # - /mnt/tv:/media/tv:ro
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Resource limits (optional but recommended)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

