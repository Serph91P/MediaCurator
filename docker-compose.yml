# Production Docker Compose Configuration
# For development, see docker-compose.dev.yml

services:
  mediacurator:
    # Use pre-built image from GitHub Container Registry
    image: ghcr.io/serph91p/mediacurator:latest
    # Or use a specific version tag:
    # image: ghcr.io/serph91p/mediacurator:1.0.0
    # Or use develop branch:
    # image: ghcr.io/serph91p/mediacurator:dev
    
    container_name: mediacurator
    restart: unless-stopped
    
    # Run as non-root user (appuser with UID 1000)
    # Note: Named volumes are managed by Docker, no manual permission fixes needed
    user: "1000:1000"
    
    ports:
      - "8080:8080"
    
    environment:
      # Timezone
      - TZ=${TZ:-Europe/Berlin}
      
      # Security - IMPORTANT: Change this in production!
      - SECRET_KEY=${SECRET_KEY:-please-change-this-secret-key-in-production}
      
      # Database
      - DATABASE_URL=sqlite+aiosqlite:////data/mediacurator.db
      
      # Optional: Pre-create admin user (useful for automated deployments)
      # If not set, first registered user via web UI becomes admin automatically
      # - INITIAL_ADMIN_USER=${ADMIN_USER:-}
      # - INITIAL_ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      
      # Optional: Debug mode (not recommended for production)
      # - DEBUG=false
    
    volumes:
      # Application data (database, config) - using named volume
      - mediacurator_data:/data
      
      # Application logs - using named volume
      - mediacurator_logs:/app/logs
      
      # Media mount - REQUIRED: Point to your actual media location
      # Mount as read-only (:ro) for safety
      - ${MEDIA_PATH:-/media}:/media:ro
      
      # Optional: Additional media paths
      # - /mnt/movies:/media/movies:ro
      # - /mnt/tv:/media/tv:ro
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Resource limits (optional but recommended)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  mediacurator_data:
    driver: local
  mediacurator_logs:
    driver: local
