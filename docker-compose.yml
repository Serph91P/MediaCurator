# Production Docker Compose Configuration
# For development, see docker-compose.dev.yml

services:
  mediacurator:
    # Use pre-built image from GitHub Container Registry
    image: ghcr.io/serph91p/mediacurator:latest
    # Or use a specific version tag:
    # image: ghcr.io/serph91p/mediacurator:1.0.0
    # Or use develop branch:
    # image: ghcr.io/serph91p/mediacurator:dev
    
    container_name: mediacurator
    restart: unless-stopped
    
    # Run as non-root user (appuser with UID 1000)
    # Note: Named volumes are managed by Docker, no manual permission fixes needed
    user: "1000:1000"
    
    ports:
      - "8080:8080"
    
    environment:
      # Timezone
      - TZ=${TZ:-Europe/Berlin}
      
      # Security - REQUIRED: Set a strong, unique secret key!
      - SECRET_KEY=${SECRET_KEY:?ERROR: SECRET_KEY must be set. Generate one with: openssl rand -hex 32}
      
      # Database - stored in /app/config (separate from media paths)
      - DATABASE_URL=sqlite+aiosqlite:////app/config/mediacurator.db
      
      # ── Cookie Auth & Reverse Proxy ──────────────────────────────────
      # CORS: Comma-separated origins matching the URL users see in the browser.
      # Must be set when behind a reverse proxy with a custom domain!
      # - CORS_ORIGINS=https://media.example.com
      
      # Trusted proxy IPs — only these may set X-Forwarded-For / X-Real-IP.
      # Required for correct client IP resolution (rate limiting, audit logs).
      # - TRUSTED_PROXIES=172.18.0.1
      
      # Optional: Token lifetimes (sensible defaults, rarely need changing)
      # - ACCESS_TOKEN_EXPIRE_MINUTES=15
      # - REFRESH_TOKEN_EXPIRE_DAYS=30
      
      # Optional: Audit log retention in days
      # - AUDIT_RETENTION_DAYS=90
      
      # Optional: Pre-create admin user (useful for automated deployments)
      # If not set, first registered user via web UI becomes admin automatically
      # - INITIAL_ADMIN_USER=${ADMIN_USER:-}
      # - INITIAL_ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      
      # Optional: Debug mode (not recommended for production)
      # - DEBUG=false
    
    volumes:
      # Application data (database, config) - separate from media paths
      - mediacurator_config:/app/config
      
      # Application logs - using named volume
      - mediacurator_logs:/app/logs
      
      # ═══════════════════════════════════════════════════════════════════
      # MEDIA MOUNT - CRITICAL: Path must match Emby/Jellyfin configuration!
      # ═══════════════════════════════════════════════════════════════════
      # The path INSIDE this container must match what Emby sees.
      # 
      # Example: If Emby uses /data for all media:
      #   - /mnt/storage/data:/data
      #
      # Example: If Emby uses /data/movies and /data/tv:
      #   - /mnt/movies:/data/movies
      #   - /mnt/tv:/data/tv
      #
      # IMPORTANT: The right side (container path) must be the SAME
      #     path that Emby/Jellyfin uses when it reports file locations!
      #     Otherwise file operations (delete, move to staging) will fail.
      #
      # For read-only safety (recommended for initial testing):
      #   - /mnt/storage/data:/data:ro
      #
      # For staging/delete operations, you need write access:
      #   - /mnt/storage/data:/data
      # ═══════════════════════════════════════════════════════════════════
      - ${MEDIA_PATH:-/data}:/data:ro
      
      # Staging directory - must be writable for staging system
      # This should also match the staging path configured in MediaCurator
      # - /mnt/storage/staging:/media/staging
      
      # Optional: Additional media paths (must match Emby library paths)
      # - /mnt/movies:/data/movies
      # - /mnt/tv:/data/tv
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Resource limits (optional but recommended)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  mediacurator_config:
    driver: local
  mediacurator_logs:
    driver: local
